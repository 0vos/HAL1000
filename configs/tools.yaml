default_toolset: basic_tools

settings:
  data_root: ../data

toolsets:
  basic_tools:
    - calculator
    - file_reader
    - local_file_search
    - table_analyzer
    - format_converter
  coding_tools:
    - calculator
    - file_reader
    - file_writer
    - local_file_search
    - code_executor
    - format_converter
  all_tools:
    - calculator
    - file_reader
    - file_writer
    - local_file_search
    - code_executor
    - table_analyzer
    - format_converter
    - pdf_reader
    - docx_reader
    - image_qa
    - shell_exec

tools:
  calculator:
    module: skills.calculator
    function: calculator
    description: Calculate a safe arithmetic expression.
    parameters:
      expression:
        type: string
        description: Arithmetic expression using numbers and supported operators.
    required: [expression]
    returns:
      result:
        type: number
        description: Calculated value.

  file_reader:
    module: skills.file_reader
    function: file_reader
    description: "Read any local UTF-8 text file. Supports absolute paths (e.g. /root/project/file.log) and relative paths (relative to data/). Supports .py, .txt, .md, .log, .js, .json, .yaml, .sh, .csv, .html, etc. Binary formats like images, PDFs, zip are not supported."
    parameters:
      path:
        type: string
        description: "File path. Use absolute path (e.g. /root/siton-tmp/HAL1000/.logs/frontend.log) when the file is outside the data/ directory."
      max_chars:
        type: integer
        description: Maximum number of characters to return.
    required: [path]
    returns:
      content: {type: string, description: File content.}
      num_chars: {type: integer, description: Returned character count.}
      source: {type: string, description: Normalized path relative to data root.}
      truncated: {type: boolean, description: Whether content was truncated.}

  local_file_search:
    module: skills.local_file_search
    function: local_file_search
    description: "Browse a directory or search files for keywords. Use query=\"list\" to list all files in a directory. Supports absolute paths."
    parameters:
      query: {type: string, description: "Search keywords, or 'list'/'ls' to list directory contents."}
      root_dir: {type: string, description: "Directory to browse/search. Supports absolute paths like /root/project/."}
      file_types:
        type: array
        items: {type: string}
        description: File extensions to filter (e.g. ["py", "md"]). Default searches all text files.
      top_k: {type: integer, description: Maximum number of results to return.}
    required: [query]
    returns:
      summary: {type: string, description: "Human-readable directory listing or search results."}
      entries: {type: array, description: "List of file/dir entries (list mode)."}
      results: {type: array, description: "Ranked search results (search mode)."}

  table_analyzer:
    module: skills.table_analyzer
    function: table_analyzer
    description: Analyze a local CSV or TSV file.
    parameters:
      path: {type: string, description: Table path relative to data root.}
      max_rows_preview: {type: integer, description: Number of preview rows.}
      describe: {type: boolean, description: Whether to calculate numeric statistics.}
    required: [path]
    returns:
      num_rows: {type: integer, description: Data row count.}
      num_columns: {type: integer, description: Column count.}
      columns: {type: array, description: Column names.}
      preview: {type: array, description: First rows.}
      describe: {type: object, description: Numeric statistics by column.}

  file_writer:
    module: skills.file_writer
    function: file_writer
    description: |
      Write text content to a file under the data directory.
      Use this to save code, reports, or any text output to disk.
      The path must be relative to the data/ directory, e.g. "algorithms/bubble_sort.py".
      Supported extensions: .py .txt .md .json .csv .yaml .yml .sh .html
    parameters:
      path:
        type: string
        description: File path relative to data/ directory. Parent directories are created automatically.
      content:
        type: string
        description: Text content to write into the file.
      overwrite:
        type: boolean
        description: Whether to overwrite if file exists. Default true.
    required: [path, content]
    returns:
      written_path: {type: string, description: Absolute path of the written file.}
      relative_path: {type: string, description: Path relative to data root.}
      num_bytes: {type: integer, description: Number of bytes written.}
      num_lines: {type: integer, description: Number of lines written.}
      overwritten: {type: boolean, description: Whether an existing file was replaced.}

  code_executor:
    module: skills.code_executor
    function: code_executor
    description: |
      Execute a Python code snippet in an isolated subprocess and return stdout, stderr, and exit code.
      Use this to write and run Python programs, do data processing, generate files, or solve complex problems step by step.
      If execution fails, examine stderr and fix the code before retrying.
    parameters:
      code:
        type: string
        description: Python source code to execute. Must be valid Python. Use print() to produce output.
      language:
        type: string
        description: Programming language. Currently only 'python' is supported.
      timeout:
        type: number
        description: Execution timeout in seconds (default 15). Increase for long-running tasks.
    required: [code]
    returns:
      stdout: {type: string, description: Standard output from the code.}
      stderr: {type: string, description: Standard error output (tracebacks etc).}
      returncode: {type: integer, description: "Process exit code. 0 = success, non-zero = error."}
      timed_out: {type: boolean, description: Whether execution was killed due to timeout.}
      elapsed_ms: {type: number, description: Wall-clock execution time in milliseconds.}

  format_converter:
    module: skills.format_converter
    function: format_converter
    description: Convert text to markdown bullets or formatted JSON and write the converted content to a file.
    parameters:
      text: {type: string, description: Input text.}
      target_format: {type: string, description: markdown or json.}
      output_filename: {type: string, description: Optional output filename. Defaults to converted.md or converted.json.}
    required: [text, target_format]
    returns:
      formatted_text: {type: string, description: Converted text.}
      generated_file_path: {type: string, description: Path of the generated output file.}

  pdf_reader:
    module: skills.pdf_reader
    function: pdf_reader
    description: |
      Read a PDF file and extract its text content.
      Supports local PDF files under the data directory.
      Requires pdfplumber (preferred) or PyPDF2.
    parameters:
      path:
        type: string
        description: PDF file path relative to the configured data root.
      max_chars:
        type: integer
        description: Maximum number of characters to return. Default 5000.
    required: [path]
    returns:
      content: {type: string, description: Extracted text content.}
      num_pages: {type: integer, description: Total number of pages in the PDF.}
      num_chars: {type: integer, description: Returned character count.}

  docx_reader:
    module: skills.docx_reader
    function: docx_reader
    description: |
      Read a Word document (.docx) and extract its text content.
      Supports local .docx files under the data directory.
      Requires python-docx (preferred) or pandoc CLI.
    parameters:
      path:
        type: string
        description: Word document path relative to the configured data root.
      max_chars:
        type: integer
        description: Maximum number of characters to return. Default 5000.
    required: [path]
    returns:
      content: {type: string, description: Extracted text content.}
      num_paragraphs: {type: integer, description: Number of non-empty paragraphs.}
      num_chars: {type: integer, description: Returned character count.}

  image_qa:
    module: skills.image_qa
    function: image_qa
    description: |
      Ask a question about a local image using Qwen3.5's native vision-language capability.
      Use this when the user wants to describe, analyze, or ask questions about an image
      (e.g. "what's in this picture?", "read the text in this screenshot", "describe this photo").
      Supports .png .jpg .jpeg .gif .webp .bmp files under the data directory.
    parameters:
      path:
        type: string
        description: Image file path relative to the configured data root.
      question:
        type: string
        description: The question to ask about the image, in natural language.
    required: [path, question]
    returns:
      answer: {type: string, description: Model's text answer about the image.}
      image_meta: {type: object, description: "Image metadata (dimensions, size, mime type)."}

  shell_exec:
    module: skills.shell_exec
    function: shell_exec
    description: "Execute read-only shell commands: ls, cat, head, tail, grep, find, wc, du, stat, etc. Use this to browse directories, read files at any absolute path, and search content. Much faster than file_reader for large files or unknown paths."
    parameters:
      command:
        type: string
        description: "Shell command to run. Examples: 'ls -la /root/project/', 'cat /root/logs/app.log', 'grep -r error /root/logs/', 'find /root -name *.py', 'head -50 /path/to/file.log'"
      workdir:
        type: string
        description: "Working directory for the command. Default: /"
      timeout:
        type: integer
        description: "Timeout in seconds (1-30). Default: 15"
    required: [command]
    returns:
      stdout: {type: string, description: Command output.}
      stderr: {type: string, description: Error output if any.}
      returncode: {type: integer, description: Exit code (0 = success).}
      truncated: {type: boolean, description: True if output was truncated to 8000 chars.}
